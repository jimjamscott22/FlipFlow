version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: flipflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flipflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - flipflow-postgres-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: flipflow-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@flipflow.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - flipflow-pgadmin-data:/var/lib/pgadmin

volumes:
  flipflow-postgres-data:
  flipflow-pgadmin-data:
